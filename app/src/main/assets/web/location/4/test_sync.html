<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>تست سینک EsmerMap</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    input, textarea, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      font-size: 14px;
    }
    pre {
      background: #f5f5f5;
      padding: 10px;
      margin-top: 15px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h3>تست ارسال مشتری به EsmerMap</h3>

<label>Sync Key</label>
<input id="key" placeholder="sync_....">

<label>نام مشتری</label>
<input id="name" value="مشتری تست">

<label>تلفن</label>
<input id="phone" value="09120000000">

<label>آدرس</label>
<input id="address" value="تهران - تست">

<button onclick="send()">ارسال</button>

<pre id="result">نتیجه اینجا نمایش داده می‌شود</pre>

<script>
async function send() {
  const key = document.getElementById('key').value.trim();
  if (!key) {
    alert('sync_key را وارد کن');
    return;
  }

  const payload = {
    mode: "upsert",
    items: [{
      customerId: "TEST_1",
      name: document.getElementById('name').value,
      phone: document.getElementById('phone').value,
      address: document.getElementById('address').value
    }]
  };

  try {
    const res = await fetch("api/sync_addresses.php", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-Esmer-Sync-Key": key
      },
      body: JSON.stringify(payload)
    });

    const text = await res.text();
    document.getElementById('result').textContent =
      "HTTP " + res.status + "\n\n" + text;
  } catch (e) {
    document.getElementById('result').textContent = e.toString();
  }
}
</script>

</body>
</html>
