<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>آدرس‌های من</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <style>
    .page{padding:12px;padding-top:92px}
    .card{background:#fff;border:1px solid #e3e7ee;border-radius:16px;padding:12px;margin:10px 0}
    textarea.input{width:100%;min-height:90px}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    .row .input{flex:1}
    .item{border:1px solid #e3e7ee;border-radius:14px;padding:10px;margin-top:8px;background:#fff}
    .meta{font-size:12px;color:#666;margin-top:6px}
    .btn2{padding:10px 12px;border-radius:12px;border:1px solid #111;background:#111;color:#fff;cursor:pointer}
    .btnLite{padding:10px 12px;border-radius:12px;border:1px solid #d8dde5;background:#fff;color:#111;cursor:pointer}
    .btnDanger{border-color:#ff3b30;color:#ff3b30}
    .topActions{display:flex;gap:8px}
  </style>
</head>
<body>
  <div class="topBar">
    <div class="searchRow">
      <div class="topActions">
        <button class="btnLite" id="btnBack">نقشه</button>
      </div>
      <div style="flex:1;font-weight:700;display:flex;align-items:center;justify-content:center">
        آدرس‌های من
      </div>
      <div class="topActions">
        <button class="btnLite btnDanger" id="btnLogout">خروج</button>
      </div>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div class="page">
    <div class="card">
      <div style="font-weight:700;margin-bottom:8px">افزودن آدرس (هر خط یک آدرس)</div>
      <textarea class="input" id="bulk" placeholder="مثال:
تهران، ولیعصر، پارک ساعی
اصفهان، چهارباغ عباسی"></textarea>

      <div class="row" style="margin-top:8px">
        <input class="input" id="tag" placeholder="نام مشتری (اختیاری)" />
        <input class="input" id="city" placeholder="شماره تماس (اختیاری)" />
      </div>

      <div class="row" style="margin-top:8px">
        <button class="btn2" id="btnAdd">افزودن</button>
        <button class="btnLite" id="btnRefresh">بروزرسانی لیست</button>
      </div>
    </div>

    <div class="card">
      <div style="font-weight:700;margin-bottom:8px">لیست آدرس‌ها</div>
      <div id="list"></div>
    </div>
  </div>

  <script src="assets/addresses.js"></script>
</body>
</html>
